name: Deploy Documentation

on:
  push:
    branches:
      - 'master'
      - 'release/**'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v18
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build Documentation
        run: nix develop --command bash -c "make doc"

      - name: Deploy Documentation
        env:
          PAT: ${{ secrets.PAT_PUSH_DOC }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref }}
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git checkout documentation

          git pull origin documentation --rebase

          version=$(echo ${BRANCH} | sed -e 's/refs\/heads\///g' | sed -e 's/release\///g')

          if [[ -n $(git status --porcelain "$version") ]]; then
            git add $version
            git commit -m"chore: update documentation of $version (auto-pushed by GitHub Actions)"
            git push https://${PAT}@github.com/${REPO}.git documentation
          else
            echo "No changes to commit, exiting."
          fi
